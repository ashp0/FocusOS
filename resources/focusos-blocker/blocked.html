<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Blocked by FocusOS</title>
	<style>
		@font-face {
			font-family: 'Open Sans';
			font-style: normal;
			font-weight: 400;
			src: url('OpenSans-Regular.ttf') format('truetype');
		}
		@font-face {
			font-family: 'Open Sans';
			font-style: normal;
			font-weight: 700;
			src: url('OpenSans-Bold.ttf') format('truetype');
		}
		html, body {
			margin: 0;
			height: 100%;
		}
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			background: #18181b;
			color: #fafafa;
			font-family: 'Open Sans', system-ui, sans-serif;
			/* faint starfield so the blocked page reads as part of the shell */
			background-image:
				radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.25), transparent),
				radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.18), transparent),
				radial-gradient(1px 1px at 50% 85%, rgba(255,255,255,0.15), transparent),
				radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.20), transparent);
		}
		.card {
			max-width: 520px;
			padding: 48px 44px;
			text-align: center;
		}
		img {
			height: 56px;
			margin-bottom: 28px;
			opacity: 0.95;
		}
		h1 {
			font-size: 26px;
			font-weight: 700;
			margin: 0 0 14px;
			letter-spacing: 0.3px;
		}
		p {
			font-size: 15px;
			line-height: 1.6;
			color: #a1a1aa;
			margin: 0 0 10px;
		}
		.site {
			display: inline-block;
			margin-top: 18px;
			padding: 8px 16px;
			border-radius: 8px;
			background: #27272a;
			color: #e4e4e7;
			font-size: 14px;
			word-break: break-all;
		}
		.meta {
			margin-top: 22px;
			font-size: 12px;
			color: #71717a;
		}
		.accent { color: #84cc16; font-weight: 700; }
	</style>
</head>
<body>
	<div class="card">
		<img src="logo.png" alt="FocusOS">
		<h1>Blocked during your focus session</h1>
		<p>This page is outside the allow&#8209;list for the routine you're running.
		   It will stay blocked until the session ends.</p>
		<div id="site" class="site" style="display:none"></div>
		<div id="meta" class="meta"></div>
	</div>
	<script src="blocked.js"></script>
</body>
</html>
